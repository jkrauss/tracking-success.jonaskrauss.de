global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO
  format: common

api:
  dashboard: false
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: "info@kmu-hessen.digital"
      storage: "/letsencrypt/acme.json"
      httpChallenge:
        entryPoint: web
